<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title> منو آنلاین فست فود پاییزی</title>
</head>
<body>
<h1>🧆 سفارش آنلاین فست‌فود پاییزی</h1>

<form id="orderForm">
    <div class="menu-item">
        <img src="./hamburger.jpg" alt="برگر">
        <div>
            <label for="burger">برگر</label>
            <select id="burger" name="burger">
                <option value="">انتخاب کنید</option>
                <option value="classic">کلاسیک</option>
                <option value="cheese">چیزبرگر</option>
                <option value="double">دوبل برگر</option>
                <option value="fishberger"> فیش برگر  </option>

            </select>
        </div>
    </div>

    <div class="menu-item">
        <img src="./pizaa.jpg" alt="پیتزا">
        <div>
            <label for="pizza">پیتزا</label>
            <select id="pizza" name="pizza">
                <option value="">انتخاب کنید</option>
                <option value="pepperoni">پپرونی</option>
                <option value="veggie">سبزیجات</option>
                <option value="margherita">مارگاریتا</option>
                <option value="makhlot">مخلوط</option>
                <option value="morghvagharch"> مرغ و قارچ</option>

            </select>
        </div>
    </div>

    <div class="menu-item">
        <img src="./Caesar salad.jpg" alt="سالاد">
        <div>
            <label for="salad">سالاد</label>
            <select id="salad" name="salad">
                <option value="">انتخاب کنید</option>
                <option value="caesar">سزار</option>
                <option value="greek">یونانی</option>
                <option value="garden"> سالاد فصل</option>
                <option value="andonezi"> سالاد اندونزی</option>

                <option value=" kalam"> سالاد کلم</option>
 
            </select>
        </div>
    </div>

    <div class="menu-item">
        <img src="./cola.jpg" alt="نوشیدنی">
        <div>
            <label for="drink">نوشیدنی</label>
            <select id="drink" name="drink">
                <option value="">انتخاب کنید</option>
                <option value="cola"> کولازرد</option>
                <option value="cola"> کولا مسکی</option>
                <option value="orange">دلستر</option>

                <option value="orange">پرتقالی</option>
                <option value="water">آب معدنی</option>
            </select>
        </div>
    </div>

    <button type="submit">ثبت سفارش</button>
</form>



<script src="script.js"></script>
</body>
</html>
